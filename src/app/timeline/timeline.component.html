<p class="px-6 pt-6">[<i> TIMELINE : </i>]</p>
<div class="timelines">
  <section class="timeline">
    <ol>
      @for (time of publicTimeline; track time.year) {
        <li>
          <div>
            <time>{{ time.year }}</time> {{ time.title }}
            <p>{{ time.description }}</p>
          </div>
        </li>
      }
    </ol>
  </section>
</div>
