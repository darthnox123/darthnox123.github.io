<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
  @for (category of categories; track category.label) {
    <div class="bg-white/[0.03] border border-white/[0.07] rounded-xl p-6 transition-colors hover:border-white/[0.12]">
      <h3 class="font-mono text-[0.7rem] font-semibold text-emerald-500 uppercase tracking-[0.12em] mb-5 pb-3.5 border-b border-white/[0.07]">
        {{ category.label }}
      </h3>
      <div class="grid gap-4" style="grid-template-columns: repeat(auto-fill, minmax(68px, 1fr))">
        @for (skill of category.skills; track skill.name) {
          <div class="flex flex-col items-center gap-1.5 cursor-default group">
            @if (skill.icon) {
              <i class="devicon-{{ skill.icon }} text-[2.125rem] text-slate-500 leading-none transition-all group-hover:text-slate-100 group-hover:-translate-y-0.5"></i>
            } @else {
              <div class="w-[2.125rem] h-[2.125rem] flex items-center justify-center font-mono text-[0.6875rem] font-bold text-emerald-500 bg-emerald-500/10 border border-emerald-500/30 rounded-md transition-transform group-hover:-translate-y-0.5 uppercase">
                {{ skill.name | slice:0:2 }}
              </div>
            }
            <span class="text-[0.6375rem] text-slate-500 text-center leading-tight transition-colors group-hover:text-slate-400">
              {{ skill.name }}
            </span>
          </div>
        }
      </div>
    </div>
  }
</div>
